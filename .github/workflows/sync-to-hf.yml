name: Sync to HuggingFace
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HuggingFace
        run: |
          git push --force https://thomas-schweich:$HF_TOKEN@huggingface.co/thomas-schweich/PAWN main
