name: Sync to HuggingFace
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: JacobLinCool/hugging-face-sync@v1
        with:
          user: thomas-schweich
          repo: PAWN
          token: ${{ secrets.HF_TOKEN }}
