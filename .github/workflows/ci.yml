name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            target
            engine/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build Rust engine
        run: cd engine && uv run --with maturin maturin develop --release

      - name: Install Python deps
        run: |
          uv sync
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Pyright
        run: uv run pyright pawn/

      - name: Tests
        run: uv run pytest tests/ -x -q -m "not gpu"

      # Rust workspace tests. The stockfish-datagen crate has live tests
      # that require a real Stockfish binary; those self-skip when
      # $HOME/bin/stockfish isn't present, so CI without Stockfish runs
      # the non-live subset only. (Set STOCKFISH_PATH in the runner env
      # to enable the live tests.)
      - name: Rust workspace tests
        run: cargo test --workspace --release
