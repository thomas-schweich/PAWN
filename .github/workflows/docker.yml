name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: thomasschweich/pawn

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      main: ${{ steps.filter.outputs.main }}
      datagen: ${{ steps.filter.outputs.datagen }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            main:
              - 'Dockerfile'
              - 'pawn/**'
              - 'engine/**'
              - 'scripts/**'
              - 'configs/**'
              - 'deploy/**'
              - 'cards/**'
              - 'docs/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'searchless_chess_vocabulary.json'
              - '.github/workflows/docker.yml'
            datagen:
              - 'Dockerfile.datagen'
              - 'engine/**'
              - 'stockfish-datagen/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/datagen_with_hf_sync.py'
              - 'scripts/benchmark_stockfish_nodes.py'
              - 'scripts/sweep_pod_workers.sh'
              - 'deploy/pod-gpu-stats.sh'
              - 'deploy/.tmux.conf'
              - '.github/workflows/docker.yml'

  build-cuda:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git tag
        id: meta
        run: echo "tag=$(git tag --points-at HEAD | head -1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push runtime (CUDA)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-runtime,mode=max

      - name: Build and push dev (CUDA)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:dev
            ${{ env.IMAGE }}:dev-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime
            type=registry,ref=${{ env.IMAGE }}:buildcache-dev
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-dev,mode=max

  build-rocm:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git tag
        id: meta
        run: echo "tag=$(git tag --points-at HEAD | head -1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push runtime (ROCm)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-rocm
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:rocm
            ${{ env.IMAGE }}:rocm-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime-rocm
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-runtime-rocm,mode=max

      - name: Build and push dev (ROCm)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev-rocm
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:dev-rocm
            ${{ env.IMAGE }}:dev-rocm-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime-rocm
            type=registry,ref=${{ env.IMAGE }}:buildcache-dev-rocm
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-dev-rocm,mode=max

  build-datagen:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.datagen == 'true'
    runs-on: ubuntu-latest
    strategy:
      # Build one image per supported microarch. The patched stockfish is
      # compiled at the requested ISA; running an `avx512` image on an
      # AVX2-only pod would SIGILL on the first eval call. Operators pick
      # the right tag for their pod's CPU. `fail-fast: false` so a
      # transient failure on one arch doesn't cancel the other.
      fail-fast: false
      matrix:
        include:
          - tag_arch: avx2
            sf_arch: x86-64-avx2
          - tag_arch: avx512
            sf_arch: x86-64-avx512
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git tag
        id: meta
        run: echo "tag=$(git tag --points-at HEAD | head -1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push runtime (datagen-${{ matrix.tag_arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.datagen
          target: runtime
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:datagen-${{ matrix.tag_arch }}
            ${{ env.IMAGE }}:datagen-${{ matrix.tag_arch }}-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
            SF_PATCHED_ARCH=${{ matrix.sf_arch }}
          # Per-arch buildcache. The `sf-fork-build` stage produces
          # different binaries per ISA, so they can't share a cache —
          # would invalidate on every alternate arch's build.
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-runtime-${{ matrix.tag_arch }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-runtime-${{ matrix.tag_arch }},mode=max

      - name: Build and push dev (datagen-dev-${{ matrix.tag_arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.datagen
          target: dev
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:datagen-dev-${{ matrix.tag_arch }}
            ${{ env.IMAGE }}:datagen-dev-${{ matrix.tag_arch }}-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
            SF_PATCHED_ARCH=${{ matrix.sf_arch }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-runtime-${{ matrix.tag_arch }}
            type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-dev-${{ matrix.tag_arch }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-dev-${{ matrix.tag_arch }},mode=max
