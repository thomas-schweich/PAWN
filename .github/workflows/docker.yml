name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: thomasschweich/pawn

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git tag
        id: meta
        run: echo "tag=$(git tag --points-at HEAD | head -1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── CUDA images ──────────────────────────────────────────────────
      - name: Build and push runtime (CUDA)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-runtime,mode=max

      - name: Build and push dev (CUDA)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:dev
            ${{ env.IMAGE }}:dev-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime
            type=registry,ref=${{ env.IMAGE }}:buildcache-dev
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-dev,mode=max

      # ── ROCm images ─────────────────────────────────────────────────
      - name: Build and push runtime (ROCm)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-rocm
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:rocm
            ${{ env.IMAGE }}:rocm-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime-rocm
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-runtime-rocm,mode=max

      - name: Build and push dev (ROCm)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev-rocm
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:dev-rocm
            ${{ env.IMAGE }}:dev-rocm-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime-rocm
            type=registry,ref=${{ env.IMAGE }}:buildcache-dev-rocm
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-dev-rocm,mode=max
