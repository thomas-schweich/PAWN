name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: thomasschweich/pawn

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      main: ${{ steps.filter.outputs.main }}
      datagen: ${{ steps.filter.outputs.datagen }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            main:
              - 'Dockerfile'
              - 'pawn/**'
              - 'engine/**'
              - 'scripts/**'
              - 'configs/**'
              - 'deploy/**'
              - 'cards/**'
              - 'docs/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'searchless_chess_vocabulary.json'
              - '.github/workflows/docker.yml'
            datagen:
              - 'Dockerfile.datagen'
              - 'engine/**'
              - 'stockfish-datagen/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/datagen_with_hf_sync.py'
              - 'scripts/build_stockfish_for_host.sh'
              - 'scripts/benchmark_stockfish_nodes.py'
              - 'scripts/sweep_pod_workers.sh'
              - 'deploy/pod-gpu-stats.sh'
              - 'deploy/.tmux.conf'
              - '.github/workflows/docker.yml'

  build-cuda:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git tag
        id: meta
        run: echo "tag=$(git tag --points-at HEAD | head -1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push runtime (CUDA)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-runtime,mode=max

      - name: Build and push dev (CUDA)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:dev
            ${{ env.IMAGE }}:dev-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime
            type=registry,ref=${{ env.IMAGE }}:buildcache-dev
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-dev,mode=max

  build-rocm:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git tag
        id: meta
        run: echo "tag=$(git tag --points-at HEAD | head -1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push runtime (ROCm)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-rocm
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:rocm
            ${{ env.IMAGE }}:rocm-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime-rocm
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-runtime-rocm,mode=max

      - name: Build and push dev (ROCm)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev-rocm
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:dev-rocm
            ${{ env.IMAGE }}:dev-rocm-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-builder
            type=registry,ref=${{ env.IMAGE }}:buildcache-runtime-rocm
            type=registry,ref=${{ env.IMAGE }}:buildcache-dev-rocm
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-dev-rocm,mode=max

  build-datagen:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.datagen == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git tag
        id: meta
        run: echo "tag=$(git tag --points-at HEAD | head -1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Single :datagen / :datagen-dev image. The patched-stockfish binary
      # is JIT-built at pod startup against the host CPU
      # (`scripts/build_stockfish_for_host.sh`), so one image covers every
      # supported microarch (avx2 / avx512 / vnni512 / fallback).
      - name: Build and push runtime (datagen)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.datagen
          target: runtime
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:datagen
            ${{ env.IMAGE }}:datagen-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-runtime
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-runtime,mode=max

      - name: Build and push dev (datagen-dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.datagen
          target: dev
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:datagen-dev
            ${{ env.IMAGE }}:datagen-dev-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ steps.meta.outputs.tag }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-runtime
            type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-dev
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-datagen-dev,mode=max

      # Integration test: the preflight build script must work end-to-end
      # on the CI runner (which is x86-64 avx2 — won't trigger the vnni512
      # / avx512 branches but does exercise the avx2 path that's most
      # commonly the fallback). Run inside the just-built image so the
      # actual binary contents are validated.
      - name: Smoke-test JIT stockfish build
        run: |
          docker run --rm \
            -e DATAGEN_BUILD_CACHE=/tmp/sfcache \
            --entrypoint /opt/datagen/scripts/build_stockfish_for_host.sh \
            ${{ env.IMAGE }}:datagen-${{ github.sha }}
