set -g mouse on
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-features ",xterm-256color:RGB"

set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 200

# Base bar style — catppuccin mocha palette inlined (no plugin).
set -g status-style "bg=#11111b,fg=#cdd6f4"

# status-left: + (new window) × (kill window)
set -g status-left "#[range=user|new-window,fg=#a6e3a1,bold] + #[norange]#[range=user|kill-window,fg=#f38ba8,bold] × #[norange] "

bind -T root MouseDown1Status {
  if -F "#{==:#{mouse_status_range},new-window}"  { new-window } {
  if -F "#{==:#{mouse_status_range},kill-window}" { confirm-before -p "kill window #W? (y/n)" kill-window } {
  if -F "#{==:#{mouse_status_range},session}"     { choose-tree -Zs } {
    select-window -t=
  }}}
}

# Window list
set -g window-status-format "#[fg=#cdd6f4,bg=#313244] #I:#W "
set -g window-status-current-format "#[fg=#11111b,bg=#89b4fa,bold] #I:#W "
set -g window-status-separator " "

# status-right: hostname, cpu%, ram%, gpu%, time, session.
# #{cpu_percentage} and #{ram_percentage} are rewritten into shell
# invocations by tmux-cpu's cpu.tmux at config-load time. GPU stats
# come from our own script (pod-gpu-stats) since tmux-cpu's gpu module
# only supports nvidia-smi — we also need rocm-smi for AMD pods.
# Hostname truncated to 12 chars so long vast.ai pod IDs don't push
# the other segments off-screen.
set -g  status-right "#[fg=#cba6f7,bold] #{=12:host_short} "
set -ag status-right "#[fg=#f9e2af] CPU #{cpu_percentage} "
set -ag status-right "#[fg=#f9e2af] RAM #{ram_percentage} "
set -ag status-right "#[fg=#89dceb] GPU #(/usr/local/bin/pod-gpu-stats) "
set -ag status-right "#[fg=#94e2d5] %H:%M "
set -ag status-right "#[range=user|session,fg=#a6e3a1,bold] #S #[norange]"

# tmux-cpu must load AFTER status-right is set — its substitution
# rewrites #{cpu_*} / #{ram_*} placeholders in the current status-right.
run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux
