set -g mouse on
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-features ",xterm-256color:RGB"

# Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#[range=user|new-window,fg=#a6e3a1,bold] + #[norange]#[range=user|kill-window,fg=#f38ba8,bold] × #[norange] "

bind -T root MouseDown1Status {
  if -F "#{==:#{mouse_status_range},new-window}"  { new-window } {
  if -F "#{==:#{mouse_status_range},kill-window}" { confirm-before -p "kill window #W? (y/n)" kill-window } {
  if -F "#{==:#{mouse_status_range},session}"     { choose-tree -Zs } {
    select-window -t=
  }}}
}
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#[range=user|session]#{E:@catppuccin_status_session}#[norange]"
